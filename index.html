<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>모닝 브리프 — 국내 시장 섹터 분석기 (서버리스 에디션)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root { --bg:#f5f4ef; --bg2:#fffefa; --bg3:#edecea; --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.16); --text:#1a1917; --text2:#5a5855; --text3:#9a9895; --accent:#b5601a; --accent2:#8f4a12; --green:#2e7d52; --red:#c0392b; --blue:#2563a8; --teal:#1a7a68; --purple:#6b5bbf; --amber:#a06b1a; --shadow:rgba(0,0,0,0.06); --shadow2:rgba(0,0,0,0.12); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; overscroll-behavior: none; }
  .header { border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 54px; background: var(--bg2); position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 8px var(--shadow); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; color: #fff; flex-shrink: 0; box-shadow: 0 2px 6px rgba(181,96,26,0.3); }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .logo-sub { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
  .version-tag { font-size: 10px; color: var(--accent); background: #fff3e8; border: 1px solid rgba(181,96,26,0.2); padding: 2px 7px 2px 5px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; cursor: default; position: relative; white-space: nowrap; user-select: none; }
  .update-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .update-dot.pulse { animation: pulse-green 2.5s ease-in-out infinite; }
  @keyframes pulse-green { 0%,100% { box-shadow: 0 0 0 0 rgba(46,125,82,0.5); } 50% { box-shadow: 0 0 0 4px rgba(46,125,82,0); } }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .time-badge { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text2); background: var(--bg3); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; display: flex; align-items: center; white-space: nowrap; font-weight: 500; }
  .time-badge b { font-family: 'JetBrains Mono', monospace; margin-left: 5px; font-weight: 600; color: var(--text); }
  .panel-toggle { display: none; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 54px); }
  .sidebar { border-right: 1px solid var(--border); padding: 18px 14px; background: var(--bg2); overflow-y: auto; position: sticky; top: 54px; height: calc(100vh - 54px); scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
  .sidebar-section { margin-bottom: 22px; }
  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }
  .api-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 13px; box-shadow: 0 1px 4px var(--shadow); }
  .source-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 11px; }
  .source-item { display: flex; align-items: center; gap: 9px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px; cursor: pointer; transition: all 0.15s; }
  .source-item:hover { border-color: var(--accent); background: #fffaf5; }
  .source-item input[type="checkbox"] { width: 15px; height: 15px; margin: 0; padding: 0; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .source-item span { font-size: 12px; color: var(--text2); cursor: pointer; }
  .btn-run { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; box-shadow: 0 2px 8px rgba(181,96,26,0.25); }
  .btn-run:hover:not(:disabled) { background: var(--accent2); }
  .btn-run:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
  .progress-wrap { margin-top: 10px; }
  .progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
  .progress-msg { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; min-height: 13px; line-height: 1.4; }
  .api-status { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--green); box-shadow: 0 0 6px rgba(46,125,82,0.5); }
  .status-label { font-size: 11px; font-weight: 600; color: var(--text2); }
  .server-tip { background: #e8f5e9; border: 1px solid rgba(46,125,82,0.2); border-radius: 8px; padding: 10px; font-size: 10px; color: var(--green); line-height: 1.5; margin-top: 8px; font-family: 'JetBrains Mono', monospace;}
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 1px 4px var(--shadow); }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; color: var(--accent); display: block; }
  .stat-lbl { font-size: 9px; color: var(--text3); margin-top: 2px; }
  .sector-list { display: flex; flex-direction: column; gap: 4px; }
  .sector-row { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 6px 9px; cursor: pointer; transition: all 0.15s; }
  .sector-row:hover { border-color: var(--accent); background: #fffaf5; }
  .sector-row.active { border-color: var(--accent); background: #fff3e8; }
  .sector-dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; flex-shrink: 0; }
  .sector-name { color: var(--text2); flex: 1; font-size: 11px; }
  .sector-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); background: var(--bg3); padding: 1px 5px; border-radius: 3px; }
  .main { padding: 22px 20px; overflow-y: auto; background: var(--bg); }
  .main-header { margin-bottom: 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .main-title { font-size: 17px; font-weight: 600; letter-spacing: -0.03em; }
  .main-sub { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
  .filter-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
  .news-grid { display: flex; flex-direction: column; gap: 10px; }
  .news-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; animation: fadeIn 0.3s ease both; box-shadow: 0 1px 6px var(--shadow); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .news-card.hidden { display: none; }
  .news-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .news-title-text { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.55; flex: 1; }
  .news-title-text a { color: inherit; text-decoration: none; display: block; cursor: pointer; }
  .news-title-text a:hover { color: var(--accent); }
  .sentiment-badge { font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .sent-pos { background: rgba(46,125,82,0.1); color: var(--green); border: 1px solid rgba(46,125,82,0.2); }
  .sent-neg { background: rgba(192,57,43,0.1); color: var(--red); border: 1px solid rgba(192,57,43,0.2); }
  .sent-neu { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
  .news-meta { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
  .source-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--border); color: var(--text3); font-weight: 500; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
  .sector-tag { font-size: 10px; padding: 3px 9px; border-radius: 5px; font-weight: 500; border: 1px solid transparent; }
  .tag-gray { background: var(--bg3); color: var(--text3); border-color: var(--border); }
  .tag-blue { background: rgba(37,99,168,0.08); color: var(--blue); border-color: rgba(37,99,168,0.18); }
  .ai-box { margin-top: 10px; background: #fff8f0; border: 1px solid rgba(181,96,26,0.15); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 13px; font-size: 12px; color: var(--text2); line-height: 1.75; }
  .ai-box-label { font-size: 9px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: fixed; top: 54px; left: 0; right: 0; bottom: 0; z-index: 150; height: calc(100vh - 54px); border-right: none; transform: translateX(-100%); transition: transform 0.28s; }
    .sidebar.open { transform: translateX(0); }
    .panel-toggle { display: block; }
  }
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-mark">MB</div>
    <div>
      <div class="logo-text">모닝 브리프 <span class="version-tag"><span class="update-dot pulse"></span>v2.0 (서버리스)</span></div>
      <div class="logo-sub">국내 시장 섹터 분석기</div>
    </div>
  </div>
  <div class="header-right">
    <div class="time-badge" id="clock">--:--:--</div>
    <button class="panel-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"> ☰ 설정</button>
  </div>
</header>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">뉴스 소스 (복수 선택)</div>
      <div class="api-card">
        <div class="source-list" id="source-list">
          <label class="source-item"><input type="checkbox" value="naver_finance" checked><span>네이버 금융</span></label>
          <label class="source-item"><input type="checkbox" value="naver_econ"><span>네이버 경제</span></label>
          <label class="source-item"><input type="checkbox" value="yonhap" checked><span>연합뉴스 경제</span></label>
          <label class="source-item"><input type="checkbox" value="hankyung" checked><span>한국경제</span></label>
          <label class="source-item"><input type="checkbox" value="mk"><span>매일경제</span></label>
          <label class="source-item"><input type="checkbox" value="edaily"><span>이데일리</span></label>
        </div>
        <button class="btn-run" id="run-btn" onclick="fetchAllNews()">서버리스 수집 + AI 분석 시작</button>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
          <div class="progress-msg" id="progress-msg">대기 중...</div>
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">시스템 아키텍처</div>
      <div class="api-card">
        <div class="api-status">
          <div class="status-dot"></div>
          <span class="status-label">Vercel 엣지 백엔드 연동 완료</span>
        </div>
        <div class="server-tip">
          <b>보안 완벽:</b> API 키가 화면에서 제거되었으며, 서버의 안전한 환경변수(Secret)에서 관리됩니다.<br><br>
          <b>네이버 방화벽 우회:</b> 서버 대 서버(S2S) 통신으로 CORS 차단 없이 데이터를 가져옵니다.
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">섹터 현황</div>
      <div class="sector-list" id="sector-list">
        <div style="font-size:10px;color:var(--text3);padding:6px 4px;">분석 후 표시됩니다</div>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title">오늘의 경제 뉴스 분석</div>
        <div class="main-sub" id="main-sub">뉴스 수집 버튼을 눌러 시작하세요</div>
      </div>
    </div>
    <div class="filter-bar" id="filter-bar" style="display:none"></div>
    <div class="news-grid" id="news-container">
      <div style="text-align:center; padding: 60px; color:var(--text3); font-size:12px;">뉴스를 가져와보세요</div>
    </div>
  </main>
</div>
<script>
  'use strict';
  // 시계 로직
  setInterval(() => {
    const d = new Date();
    document.getElementById('clock').innerHTML = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
  }, 1000);

  // [마스터피스] 동시성 제어 큐
  async function processQueue(tasks, limit) {
    const results = [];
    const executing = new Set();
    for (const task of tasks) {
      const p = Promise.resolve().then(() => task());
      results.push(p);
      executing.add(p);
      const clean = p.then(() => executing.delete(p));
      if (executing.size >= limit) await Promise.race(executing);
    }
    return Promise.all(results);
  }

  const KEYWORD_SECTOR = {
    '반도체':'반도체','HBM':'반도체','DRAM':'반도체','파운드리':'반도체',
    '인공지능':'AI·인공지능','AI':'AI·인공지능','챗GPT':'AI·인공지능','LLM':'AI·인공지능',
    '배터리':'2차전지','2차전지':'2차전지','양극재':'2차전지','전고체':'2차전지',
    '전기차':'전기차·자동차','자동차':'전기차·자동차','현대차':'전기차·자동차','테슬라':'전기차·자동차',
    '바이오':'바이오·제약','제약':'바이오·제약','신약':'바이오·제약','FDA':'바이오·제약',
    '금리':'금융·보험','한국은행':'금융·보험','연준':'금융·보험','증권':'금융·보험',
    '핀테크':'핀테크·인터넷금융','간편결제':'핀테크·인터넷금융','가상자산':'핀테크·인터넷금융',
    '원전':'원전·신재생','태양광':'원전·신재생','수소':'원전·신재생','재생에너지':'원전·신재생',
    '방산':'방산·우주','무기':'방산·우주','우주':'방산·우주','발사체':'방산·우주',
    '조선':'조선·해운','해운':'조선·해운','선박':'조선·해운','LNG선':'조선·해운'
  };

  const POS_KW = ['상승','증가','성장','호실적','수주','흑자','돌파','급등','강세','개선','회복','반등','최대'];
  const NEG_KW = ['하락','감소','적자','리스크','우려','위기','제재','손실','침체','급락','약세','부진','악화'];

  function detectSectors(text) {
    const found = new Set();
    for (const [kw, sector] of Object.entries(KEYWORD_SECTOR)) if (text.includes(kw)) found.add(sector);
    return [...found];
  }

  function detectSentiment(text) {
    let score = 0;
    POS_KW.forEach(w => { if (text.includes(w)) score++; });
    NEG_KW.forEach(w => { if (text.includes(w)) score--; });
    if (score > 0) return { label:'▲ 긍정', cls:'sent-pos' };
    if (score < 0) return { label:'▼ 부정', cls:'sent-neg' };
    return { label:'— 중립', cls:'sent-neu' };
  }

  function setProgress(pct, msg) {
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('progress-msg').textContent = msg;
  }

  // ── Vercel 백엔드 호출 로직 ──
  let allCards = [];

  async function fetchAllNews() {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = '서버 통신 중...';

    const checked = [...document.querySelectorAll('.source-list input:checked')].map(i => i.value);
    if (!checked.length) { alert('소스를 선택하세요'); btn.disabled = false; return; }
    
    document.getElementById('news-container').innerHTML = '';
    setProgress(10, `백엔드 서버에 RSS 파싱 요청 중...`);
    
    try {
      // 1. 백엔드에서 네이버 방화벽을 뚫고 데이터 가져오기
      const res = await fetch(`/api/service?action=rss&sources=${checked.join(',')}`);
      const data = await res.json();
      if (!data.success || !data.items.length) throw new Error('데이터 파싱 실패');
      
      // 중복 제거
      const seen = new Set();
      const rawItems = data.items.filter(i => {
        const key = i.title.slice(0, 20);
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
      
      setProgress(40, `총 ${rawItems.length}건 확보 — AI 분석 서버 호출 시작...`);
      
      // 2. 동시성 제어 큐를 활용하여 백엔드 AI 엔진에 비동기 병렬 요청 (속도 3배 증가)
      const tasks = rawItems.map((item, i) => async () => {
        const sectors = detectSectors(item.title);
        const sentiment = detectSentiment(item.title);
        let aiText = null;

        const pct = 40 + Math.round(((i + 1) / rawItems.length) * 55);
        setProgress(pct, `AI 서버 엔진 구동 중 (${i+1}/${rawItems.length})`);
        
        try {
          const aiRes = await fetch(`/api/service?action=ai&title=${encodeURIComponent(item.title)}`);
          const aiData = await aiRes.json();
          if (aiData.success) aiText = aiData.text;
        } catch(e) { console.warn('AI 분석 실패'); }
        return { item, sectors, sentiment, aiText, idx: i };
      });
      
      const cardDataArr = await processQueue(tasks, 3); // 한 번에 3개씩 병렬 처리
      cardDataArr.sort((a, b) => a.idx - b.idx);
      allCards = cardDataArr;
      renderCards(cardDataArr);
      setProgress(100, `완료 ✓ `);
    } catch (error) {
      alert("서버 연결에 실패했습니다. Vercel 배포가 제대로 되었는지 확인하세요.");
      setProgress(0, "오류 발생");
    }
    
    setTimeout(() => setProgress(0, '대기 중...'), 3000);
    btn.disabled = false;
    btn.textContent = '서버리스 수집 + AI 분석 시작';
  }

  function renderCards(cardDataArr) {
    const container = document.getElementById('news-container');
    const frag = document.createDocumentFragment();
    cardDataArr.forEach(d => {
      const card = document.createElement('div');
      card.className = 'news-card';
      card.style.animationDelay = `${d.idx * 0.04}s`;
      let tagHtml = d.sectors.length
        ? d.sectors.map(s => `<span class="sector-tag tag-blue">${s}</span>`).join('')
        : `<span class="sector-tag tag-gray">섹터 미감지</span>`;
      card.innerHTML = `
        <div class="news-card-top">
          <div class="news-title-text"><a href="${d.item.link}" target="_blank">${d.item.title}</a></div>
          <span class="sentiment-badge ${d.sentiment.cls}">${d.sentiment.label}</span>
        </div>
        <div class="news-meta">
          <span class="source-badge">${d.item.source}</span>
        </div>
        <div class="tag-row">${tagHtml}</div>
        ${d.aiText ? `<div class="ai-box"><div class="ai-box-label">✦ Vercel AI 엔진 분석</div><div>${d.aiText}</div></div>` : ''}
      `;
      frag.appendChild(card);
    });
    container.innerHTML = '';
    container.appendChild(frag);
  }
</script>
</body>
</html>
